# Categorizes GitHub's auto-generated release notes by PR label.
changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
  categories:
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Dependencies
      labels:
        - dependencies
    - title: CI & Tooling
      labels:
        - ci
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
