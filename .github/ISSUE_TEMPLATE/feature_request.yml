name: Feature request
description: Suggest an enhancement to the conversion pipeline
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What document or workflow does the current behavior fall short on?
      placeholder: e.g. "Multi-column academic PDFs interleave reading order."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the plugin do? Which stage would it live in?
    validations:
      required: true

  - type: dropdown
    id: capability-tier
    attributes:
      label: Capability tier
      description: Which tier does this target? (graceful degradation must be preserved)
      options:
        - Always-on (no VLM client required)
        - Opt-in VLM path
        - Either / not sure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
